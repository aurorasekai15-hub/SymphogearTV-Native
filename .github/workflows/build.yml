name: Build SymphogearTV APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        accept-android-sdk-licenses: false

    - name: Accept Android Licenses
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;30.0.3" "platforms;android-30" || true

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.0.2'

    - name: Build Release APK
      run: gradle assembleRelease

    - name: Sign APK
      run: |
        keytool -genkey -v -keystore symphogear.keystore \
          -alias symphogear -keyalg RSA -keysize 2048 -validity 10000 \
          -dname "CN=SymphogearTV, OU=TV, O=Symphogear, L=ID, S=ID, C=ID" \
          -storepass symphogear123 -keypass symphogear123 -noprompt

        APKSIGNER=$(find ${ANDROID_HOME}/build-tools/ -name "apksigner" | sort -r | head -1)

        $APKSIGNER sign \
          --ks symphogear.keystore \
          --ks-pass pass:symphogear123 \
          --key-pass pass:symphogear123 \
          --out SymphogearTV.apk \
          app/build/outputs/apk/release/*.apk

    - uses: actions/upload-artifact@v4
      with:
        name: SymphogearTV-Native-APK-${{ github.run_number }}
        path: SymphogearTV.apk
